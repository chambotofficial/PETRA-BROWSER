<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Petra Browser (Shared)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="topbar">
    <button id="btn_back" class="btn small">← Home</button>
    <div id="title">* PETRA BROWSER *</div>
    <div class="right">
      <span id="user_info"></span>
      <button id="btn_projects" class="btn small">Projekty</button>
      <button id="btn_add" class="btn accent">+ Dodaj stronę</button>
    </div>
  </div>

  <div id="main"></div>

  <!-- Templates -->
  <template id="home-template">
    <div class="home-wrap">
      <h1>PETRA BROWSER</h1>
      <p class="hint">wpisz nazwę strony i naciśnij Enter</p>
      <div class="search-outer">
        <div class="search-inner">
          <input id="search_input" placeholder="Szukaj..." />
          <button id="search_go" class="btn accent">→</button>
        </div>
        <div id="suggestions" class="suggestions"></div>
      </div>
      <div class="bot-row">
        <button id="open_bot" class="btn">Petra bot</button>
        <small>Petra bot twój niezawodny asystent</small>
      </div>
    </div>
  </template>

  <template id="projects-template">
    <div class="projects-wrap">
      <h2>Wszystkie Projekty</h2>
      <div id="projects_grid" class="grid"></div>
    </div>
  </template>

  <template id="page-template">
    <div class="page-wrap">
      <h2 id="page_title"></h2>
      <div id="page_image"></div>
      <div id="page_content" class="page-content"></div>
      <div id="page_meta" class="page-meta"></div>
    </div>
  </template>

  <template id="editor-template">
    <div class="editor-wrap">
      <h2 id="editor_title">Nowa strona</h2>
      <label>Nazwa strony</label>
      <input id="editor_name" />
      <label>Tresc strony</label>
      <textarea id="editor_content" rows="10"></textarea>
      <div class="img-row">
        <span id="img_status">Brak obrazka</span>
        <input id="img_file" type="file" accept="image/*" />
      </div>
      <div class="editor-actions">
        <button id="save_page" class="btn accent">Zapisz stronę</button>
        <button id="cancel_edit" class="btn">Anuluj</button>
      </div>
    </div>
  </template>

  <template id="bot-template">
    <div class="bot-wrap">
      <h2>Petra Bot (Markov)</h2>
      <div id="chat" class="chat"></div>
      <div class="chat-input">
        <input id="bot_input" placeholder="Napisz coś..." />
        <button id="bot_send" class="btn accent">Wyślij →</button>
      </div>
    </div>
  </template>

  <!-- Firebase SDK -->
  <script type="module" src="app.js"></script>
</body>
</html>
